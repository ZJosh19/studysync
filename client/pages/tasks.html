<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudySync — Tasks</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav>
    <div>
      <a href="dashboard.html">🏠 Home</a>
      <a href="tasks.html">📋 Tasks</a>
      <a href="subjects.html">📚 Subjects</a>
      <a href="timer.html">⏱ Timer</a>
      <a href="deadlines.html">⏰ Deadlines</a>
    </div>
    <button onclick="logout()" style="padding:6px 14px;font-size:13px;">Logout</button>
  </nav>

  <div class="container">
    <h1>📋 Task Manager</h1>

    <!-- Add Task Form -->
    <div style="background:#F9F9F9;padding:20px;border-radius:8px;margin-bottom:24px;">
      <h2>Add New Task</h2>
      <label>Task Title</label>
      <input type="text" id="task-title" placeholder="e.g. Study Chapter 3" />
      <label>Subject</label>
      <select id="task-subject">
        <option value="">-- Select Subject --</option>
      </select>
      <label>Priority</label>
      <select id="task-priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button onclick="addTask()">+ Add Task</button>
    </div>

    <!-- Filter -->
    <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;">
      <label style="margin:0;width:auto;font-weight:bold;">Filter:</label>
      <select id="filter-status" onchange="renderTasks()" style="width:auto;margin:0;">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="done">Done</option>
      </select>
    </div>

    <!-- Task List -->
    <h2>Your Tasks</h2>
    <ul id="task-list">
      <li style="color:#999;">No tasks yet. Add one above!</li>
    </ul>
  </div>
  <script src="../js/main.js"></script>
  <script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '../index.html';

  let tasks = [];

  // Load subjects into dropdown
  async function loadSubjects() {
    const res = await fetch(`${API}/subjects`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const subjects = await res.json();
    const select = document.getElementById('task-subject');
    subjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.subject_id;
      opt.textContent = s.subject_name;
      select.appendChild(opt);
    });
  }

  // Load tasks from API
  async function loadTasks() {
    const res = await fetch(`${API}/tasks`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    tasks = await res.json();
    renderTasks();
  }

  async function addTask() {
    const title      = document.getElementById('task-title').value.trim();
    const subject_id = document.getElementById('task-subject').value;
    const priority   = document.getElementById('task-priority').value;
    if (!title) return showToast('Please enter a task title!', 'warning');

    await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ title, subject_id: subject_id || null, priority })
    });
    document.getElementById('task-title').value = '';
    loadTasks();
  }

  async function toggleTask(id, currentStatus) {
    const newStatus = currentStatus === 'done' ? 'pending' : 'done';
    const task = tasks.find(t => t.task_id === id);
    await fetch(`${API}/tasks/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        title: task.title,
        priority: task.priority,
        status: newStatus
      })
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadTasks();
  }

  function renderTasks() {
    const filter = document.getElementById('filter-status').value;
    const list   = document.getElementById('task-list');
    const filtered = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);
    if (filtered.length === 0) {
      list.innerHTML = '<li style="color:#999;">No tasks found.</li>';
      return;
    }
    list.innerHTML = filtered.map(t => `
      <li style="opacity:${t.status === 'done' ? '0.5' : '1'}">
        <div>
          <input type="checkbox" ${t.status === 'done' ? 'checked' : ''}
            onchange="toggleTask(${t.task_id}, '${t.status}')" />
          <span style="margin-left:8px;
            text-decoration:${t.status === 'done' ? 'line-through' : 'none'}">
            ${t.title}
          </span>
          <span style="margin-left:10px;font-size:11px;color:#888;">
            ${t.subject_name || ''} • ${t.priority}
          </span>
        </div>
        <button class="delete-btn" onclick="deleteTask(${t.task_id})">🗑 Delete</button>
      </li>`).join('');
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../index.html';
  }

  // Init
  loadSubjects();
  loadTasks();
</script>

</body>
</html>
